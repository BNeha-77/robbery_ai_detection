<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
</head>
<body>
    <h2>Admin Dashboard</h2>
    <h3>User Details</h3>
    <ul>
        {% for profile in users %}
            <li>{{ profile.user.username }} - <a href="{% url 'remove_user' profile.user.id %}">Remove</a></li>
        {% empty %}
            <li>No users found.</li>
        {% endfor %}
    </ul>
    <a href="{% url 'logout' %}">Logout</a>
</body>
</html>
